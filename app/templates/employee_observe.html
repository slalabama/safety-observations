<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Observation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a2b4a;
            min-height: 100vh;
            color: #333;
        }
        .page-logo {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 10;
        }
        .page-logo img { max-width: 110px; height: auto; display: block; filter: brightness(0) invert(1); }
        .screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #1a2b4a; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
        label { display: block; color: #333; font-size: 14px; font-weight: 600; margin: 12px 0 6px; }
        input[type=text], select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            font-family: inherit;
            background: white;
        }
        textarea { min-height: 120px; resize: vertical; }
        input:focus, select:focus, textarea:focus { border-color: #1a2b4a; }
        .or-divider { text-align: center; color: #999; margin: 14px 0 4px; font-size: 13px; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: #1a2b4a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 18px;
        }
        .btn:hover { background: #243d6b; }
        .btn:disabled { background: #999; cursor: not-allowed; }
        .btn-submit { background: #28a745; }
        .btn-submit:hover { background: #218838; }
        .media-row { display: flex; gap: 10px; margin-top: 8px; }
        .media-btn {
            flex: 1;
            padding: 14px;
            border: 2px dashed #c0c0c0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            background: #fafafa;
            font-size: 14px;
            color: #555;
        }
        .media-btn:hover { border-color: #1a2b4a; background: #f0f4ff; }
        .media-btn .icon { display: block; font-size: 22px; margin-bottom: 4px; }
        #photoInput, #videoInput { display: none; }
        .preview { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .preview-item { position: relative; padding: 6px 10px; background: #eaf3ff; border-radius: 6px; font-size: 13px; }
        .preview-item .remove { margin-left: 8px; color: #d33; cursor: pointer; font-weight: bold; }
        .error-msg { display: none; background: #fff0f0; border: 1px solid #dc3545; color: #dc3545; padding: 10px 14px; border-radius: 8px; font-size: 14px; margin: 10px 0; }
        .info-msg { font-size: 12px; color: #666; margin-top: 6px; }
        .greeting { background: #eaf3ff; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 14px; color: #1a2b4a; }
        .success-icon { font-size: 64px; color: #28a745; text-align: center; margin-bottom: 16px; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ---- Mobile: stop logo from free-floating over content ---- */
        @media (max-width: 600px) {
            .page-logo {
                position: absolute;   /* scrolls away with the page instead of permanently covering */
                top: 12px;
                left: 12px;
            }
            .page-logo img { max-width: 64px; }
            .screen {
                padding-top: 76px;    /* push the card below where the logo sits */
                align-items: flex-start;
            }
            .card { padding: 24px 20px; }
        }
    </style>
</head>
<body>
    <div class="page-logo">
        <img src="https://www.sl-america.com/wp-content/uploads/logo.png" alt="SL Logo">
    </div>

    <!-- LOGIN SCREEN -->
    <div class="screen" id="loginScreen">
        <div class="card">
            <h1>Safety Observation</h1>
            <div class="subtitle">SL Alabama, LLC</div>
            <div style="font-size:13px;color:#666;margin-bottom:8px;">
                Enter your <strong>First and Last Name</strong>, or your <strong>Employee ID</strong>.
            </div>

            <label for="firstName">First Name</label>
            <input type="text" id="firstName" placeholder="First Name" autocomplete="given-name">

            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" placeholder="Last Name" autocomplete="family-name">

            <div class="or-divider">— OR —</div>

            <label for="badge">Employee ID</label>
            <input type="text" id="badge" placeholder="Employee ID" inputmode="numeric">

            <div class="error-msg" id="loginError"></div>
            <button class="btn" id="loginBtn" onclick="doLogin()">Continue →</button>
        </div>
    </div>

    <!-- REPORT FORM -->
    <div class="screen" id="formScreen" style="display:none;">
        <div class="card">
            <div class="greeting">Submitting as <strong id="empNameDisplay"></strong></div>

            <label for="incidentType">Type of Incident *</label>
            <select id="incidentType">
                <option value="">— Select —</option>
                <option value="Near Miss Accident">Near Miss Accident</option>
                <option value="Accident">Accident</option>
                <option value="Safety Concern">Safety Concern</option>
            </select>

            <label for="description">Description *</label>
            <textarea id="description" placeholder="Describe what happened, who was involved, where it occurred, and any other relevant detail."></textarea>

            <label>Photo (optional, max 10 MB)</label>
            <div class="media-row">
                <div class="media-btn" onclick="pickFile('photoInput')">
                    <span class="icon">📷</span>
                    <span id="photoBtnLabel">Add Photo</span>
                </div>
            </div>
            <input type="file" id="photoInput" accept="image/*" capture="environment" onchange="handleFile(this, 'photo')">

            <label>Video (optional, max 10 MB)</label>
            <div class="media-row">
                <div class="media-btn" onclick="pickFile('videoInput')">
                    <span class="icon">🎥</span>
                    <span id="videoBtnLabel">Add Video</span>
                </div>
            </div>
            <input type="file" id="videoInput" accept="video/*" capture="environment" onchange="handleFile(this, 'video')">

            <div class="preview" id="mediaPreview"></div>

            <div class="error-msg" id="formError"></div>
            <button class="btn btn-submit" id="submitBtn" onclick="submitReport()">Submit Observation</button>
            <button class="btn" style="background:#ddd;color:#333;margin-top:10px;" onclick="logoutObserve()">Cancel</button>
        </div>
    </div>

    <!-- SUCCESS SCREEN -->
    <div class="screen" id="successScreen" style="display:none;">
        <div class="card" style="text-align:center;">
            <div class="success-icon">✅</div>
            <h1>Thank You!</h1>
            <div class="subtitle">Your observation has been submitted.</div>
            <button class="btn" onclick="resetForm()">Submit Another</button>
            <button class="btn" style="background:#ddd;color:#333;margin-top:10px;" onclick="logoutObserve()">Done</button>
        </div>
    </div>

    <script>
        const MAX_BYTES = 10 * 1024 * 1024;
        let currentEmployee = null;
        let photoFile = null;
        let videoFile = null;

        function showError(elId, msg) {
            const el = document.getElementById(elId);
            el.textContent = msg;
            el.style.display = 'block';
        }
        function hideError(elId) {
            document.getElementById(elId).style.display = 'none';
        }

        async function doLogin() {
            hideError('loginError');
            const firstName = document.getElementById('firstName').value.trim();
            const lastName  = document.getElementById('lastName').value.trim();
            const badge     = document.getElementById('badge').value.trim();

            if (!badge && (!firstName || !lastName)) {
                showError('loginError', 'Enter first and last name, or your Employee ID.');
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Verifying...';

            try {
                const res = await fetch('/api/auth/observe-login', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    credentials: 'include',
                    body: JSON.stringify({ first_name: firstName, last_name: lastName, badge: badge })
                });
                const data = await res.json();
                if (res.ok) {
                    currentEmployee = { name: data.employee_name, badge: data.badge };
                    document.getElementById('empNameDisplay').textContent = data.employee_name;
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('formScreen').style.display  = 'flex';
                } else {
                    showError('loginError', typeof data.detail === 'string' ? data.detail : 'Login failed.');
                }
            } catch (e) {
                showError('loginError', 'Connection error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Continue →';
            }
        }

        function pickFile(inputId) {
            const el = document.getElementById(inputId);
            el.value = null;
            el.click();
        }

        function handleFile(input, type) {
            hideError('formError');
            const file = input.files[0];
            if (!file) return;
            if (file.size > MAX_BYTES) {
                showError('formError', (type === 'photo' ? 'Photo' : 'Video') + ' exceeds 10 MB limit.');
                input.value = null;
                return;
            }
            if (type === 'photo') {
                photoFile = file;
                document.getElementById('photoBtnLabel').textContent = 'Replace Photo';
            } else {
                videoFile = file;
                document.getElementById('videoBtnLabel').textContent = 'Replace Video';
            }
            renderPreview();
        }

        function renderPreview() {
            const container = document.getElementById('mediaPreview');
            container.innerHTML = '';
            if (photoFile) {
                const item = document.createElement('div');
                item.className = 'preview-item';
                item.innerHTML = '📷 ' + photoFile.name + ' (' + (photoFile.size/1024/1024).toFixed(2) + ' MB)' +
                                 ' <span class="remove" onclick="clearMedia(\'photo\')">×</span>';
                container.appendChild(item);
            }
            if (videoFile) {
                const item = document.createElement('div');
                item.className = 'preview-item';
                item.innerHTML = '🎥 ' + videoFile.name + ' (' + (videoFile.size/1024/1024).toFixed(2) + ' MB)' +
                                 ' <span class="remove" onclick="clearMedia(\'video\')">×</span>';
                container.appendChild(item);
            }
        }

        function clearMedia(type) {
            if (type === 'photo') {
                photoFile = null;
                document.getElementById('photoInput').value = null;
                document.getElementById('photoBtnLabel').textContent = 'Add Photo';
            } else {
                videoFile = null;
                document.getElementById('videoInput').value = null;
                document.getElementById('videoBtnLabel').textContent = 'Add Video';
            }
            renderPreview();
        }

        async function submitReport() {
            hideError('formError');
            const incidentType = document.getElementById('incidentType').value;
            const description  = document.getElementById('description').value.trim();

            if (!incidentType) { showError('formError', 'Please select a Type of Incident.'); return; }
            if (!description)  { showError('formError', 'Please enter a description.'); return; }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Submitting...';

            const fd = new FormData();
            fd.append('incident_type', incidentType);
            fd.append('description', description);
            if (currentEmployee && currentEmployee.badge) fd.append('badge', currentEmployee.badge);
            if (photoFile) fd.append('photo', photoFile);
            if (videoFile) fd.append('video', videoFile);

            try {
                const res = await fetch('/api/observations/forms/submit', {
                    method: 'POST',
                    credentials: 'include',
                    body: fd
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('formScreen').style.display = 'none';
                    document.getElementById('successScreen').style.display = 'flex';
                } else {
                    showError('formError', typeof data.detail === 'string' ? data.detail : 'Submission failed.');
                }
            } catch (e) {
                showError('formError', 'Connection error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Submit Observation';
            }
        }

        function resetForm() {
            document.getElementById('incidentType').value = '';
            document.getElementById('description').value  = '';
            clearMedia('photo'); clearMedia('video');
            document.getElementById('successScreen').style.display = 'none';
            document.getElementById('formScreen').style.display    = 'flex';
        }

        function logoutObserve() {
            currentEmployee = null;
            photoFile = null; videoFile = null;
            document.getElementById('firstName').value = '';
            document.getElementById('lastName').value  = '';
            document.getElementById('badge').value     = '';
            document.getElementById('incidentType').value = '';
            document.getElementById('description').value  = '';
            document.getElementById('mediaPreview').innerHTML = '';
            document.getElementById('successScreen').style.display = 'none';
            document.getElementById('formScreen').style.display    = 'none';
            document.getElementById('loginScreen').style.display   = 'flex';
        }

        ['firstName','lastName','badge'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
        });
    </script>
</body>
</html>
