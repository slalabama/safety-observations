<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Observations - Observation Forms</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #1a2b4a; color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
        .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-logo h2 { font-size: 16px; font-weight: 700; color: white; }
        .sidebar-logo p { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
        .sidebar-logo .logo-icon { font-size: 28px; margin-bottom: 8px; }
        .nav-section { padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-section-title { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; padding: 0 20px 8px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { border-left: 3px solid #4a9eff; }
        .nav-icon { font-size: 18px; width: 24px; }
        .sidebar-footer { margin-top: auto; padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .user-avatar { width: 36px; height: 36px; background: #4a9eff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
        .user-name { font-size: 13px; font-weight: 600; color: white; }
        .user-role { font-size: 11px; color: rgba(255,255,255,0.5); }
        .btn-logout { width: 100%; padding: 8px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .btn-logout:hover { background: rgba(255,0,0,0.2); color: white; }
        .main { margin-left: 260px; flex: 1; display: flex; flex-direction: column; }
        .topbar { background: white; padding: 16px 32px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: space-between; }
        .topbar h1 { font-size: 20px; color: #1a2b4a; font-weight: 700; }
        .content { padding: 32px; flex: 1; }
        .layout { display: grid; grid-template-columns: 340px 1fr; gap: 24px; align-items: start; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
        .card-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
        .card-header h3 { font-size: 15px; font-weight: 700; color: #1a2b4a; }
        .card-body { padding: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #1a2b4a; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .btn-primary { width: 100%; padding: 11px; background: #1a2b4a; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-primary:hover { background: #243d6b; }
        .btn-secondary { padding: 8px 16px; background: white; color: #1a2b4a; border: 2px solid #1a2b4a; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-secondary:hover { background: #1a2b4a; color: white; }
        .btn-danger { padding: 6px 12px; background: none; color: #dc3545; border: 1px solid #dc3545; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .btn-danger:hover { background: #dc3545; color: white; }
        .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
        .alert.success { background: #d4edda; color: #155724; }
        .alert.error { background: #f8d7da; color: #721c24; }
        .forms-list { display: flex; flex-direction: column; gap: 16px; }
        .form-item { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
        .form-item-header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border-bottom: 1px solid #f0f0f0; transition: background 0.2s; }
        .form-item-header:hover { background: #f8f9ff; }
        .form-item-title { font-size: 15px; font-weight: 700; color: #1a2b4a; }
        .form-item-meta { font-size: 12px; color: #999; margin-top: 2px; }
        .form-item-actions { display: flex; align-items: center; gap: 8px; }
        .badge-active { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; background: #d4edda; color: #155724; }
        .badge-inactive { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; background: #f8d7da; color: #721c24; }
        .form-item-body { padding: 20px; display: none; }
        .form-item-body.open { display: block; }
        .questions-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
        .question-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #f8f9fa; border-radius: 8px; border-left: 3px solid #1a2b4a; }
        .question-text { font-size: 14px; color: #333; flex: 1; }
        .question-type { font-size: 11px; color: #666; background: #e0e0e0; padding: 2px 8px; border-radius: 10px; margin: 0 12px; white-space: nowrap; }
        .question-required { font-size: 11px; color: #dc3545; margin-right: 8px; }
        .add-question-form { background: #f8f9fa; border-radius: 8px; padding: 16px; margin-top: 8px; }
        .add-question-form h4 { font-size: 13px; font-weight: 700; color: #1a2b4a; margin-bottom: 12px; }
        .question-row { display: grid; grid-template-columns: 1fr auto auto auto; gap: 10px; align-items: end; }
        .empty-state { padding: 24px; text-align: center; color: #999; font-size: 13px; }
        .drag-handle { color: #ccc; margin-right: 8px; cursor: grab; font-size: 16px; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .checkbox-group input[type=checkbox] { width: auto; }
        .checkbox-group label { font-size: 13px; color: #333; font-weight: normal; margin: 0; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="https://www.sl-america.com/wp-content/uploads/logo.png" alt="SL Logo" style="max-width:140px;height:auto;display:block;margin-bottom:8px;">
            <h2>Safety Observations</h2>
            <p>Admin Portal</p>
        </div>
        <div class="nav-section">
            <div class="nav-section-title">Main</div>
            <a href="/admin/" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
        </div>
        <div class="nav-section">
            <div class="nav-section-title">Management</div>
            <a href="/admin/users" class="nav-item"><span class="nav-icon">👥</span> Employees</a>
            <a href="/admin/observations" class="nav-item active"><span class="nav-icon">📋</span> Observation Forms</a>
            <a href="/admin/walkarounds" class="nav-item"><span class="nav-icon">🚶</span> Walk-Around Forms</a>
        </div>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">C</div>
                <div>
                    <div class="user-name" id="userName">Admin</div>
                    <div class="user-role">Administrator</div>
                </div>
            </div>
            <button class="btn-logout" onclick="logout()">🚪 Sign Out</button>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <h1>📋 Observation Forms</h1>
            <span style="font-size:13px;color:#666;" id="formCount">Loading...</span>
        </div>
        <div class="content">
            <div class="layout">

                <!-- CREATE FORM -->
                <div class="card">
                    <div class="card-header"><h3>➕ Create New Form</h3></div>
                    <div class="card-body">
                        <div class="alert" id="createAlert"></div>
                        <div class="form-group">
                            <label>Form Name *</label>
                            <input type="text" id="formName" placeholder="e.g. Near-Miss Report">
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="formDesc" placeholder="Brief description of when to use this form..."></textarea>
                        </div>
                        <button class="btn-primary" onclick="createForm()">Create Form</button>
                    </div>
                </div>

                <!-- FORMS LIST -->
                <div>
                    <div id="formsList" class="forms-list">
                        <div class="empty-state">Loading forms...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const name = localStorage.getItem('employee_name') || 'Admin';
        document.getElementById('userName').textContent = name;
        document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();

        async function checkAuth() {
            const res = await fetch('/api/auth/me', { credentials: 'include' });
            if (!res.ok) window.location.href = '/admin/login';
        }

        async function loadForms() {
            try {
                const res = await fetch('/api/observations/forms/', { credentials: 'include' });
                if (!res.ok) { window.location.href = '/admin/login'; return; }
                const forms = await res.json();
                document.getElementById('formCount').textContent = forms.length + ' forms';
                renderForms(forms);
            } catch (err) { console.error(err); }
        }

        function renderForms(forms) {
            const container = document.getElementById('formsList');
            if (forms.length === 0) {
                container.innerHTML = '<div class="empty-state">No observation forms yet. Create one to get started.</div>';
                return;
            }
            container.innerHTML = forms.map(f => `
                <div class="form-item" id="form-${f.id}">
                    <div class="form-item-header" onclick="toggleForm(${f.id})">
                        <div>
                            <div class="form-item-title">${f.name}</div>
                            <div class="form-item-meta">${f.question_count} questions · ${f.description || 'No description'}</div>
                        </div>
                        <div class="form-item-actions">
                            <span class="${f.active ? 'badge-active' : 'badge-inactive'}">${f.active ? 'Active' : 'Inactive'}</span>
                            <span style="color:#ccc;font-size:18px;">▼</span>
                        </div>
                    </div>
                    <div class="form-item-body" id="body-${f.id}">
                        <div id="questions-${f.id}" class="questions-list">
                            <div class="empty-state">Loading questions...</div>
                        </div>
                        <div class="add-question-form">
                            <h4>Add Question</h4>
                            <div class="form-group">
                                <label>Question Text *</label>
                                <input type="text" id="qtext-${f.id}" placeholder="e.g. Was anyone injured?">
                            </div>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                                <div class="form-group">
                                    <label>Question Type</label>
                                    <select id="qtype-${f.id}">
                                        <option value="text">Text (free entry)</option>
                                        <option value="checkbox">Yes / No</option>
                                        <option value="select">Multiple Choice</option>
                                        <option value="textarea">Long Text</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>&nbsp;</label>
                                    <div class="checkbox-group" style="padding-top:10px;">
                                        <input type="checkbox" id="qreq-${f.id}">
                                        <label for="qreq-${f.id}">Required field</label>
                                    </div>
                                </div>
                            </div>
                            <button class="btn-primary" onclick="addQuestion(${f.id})" style="margin-top:4px;">Add Question</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function toggleForm(formId) {
            const body = document.getElementById('body-' + formId);
            const isOpen = body.classList.contains('open');
            
            document.querySelectorAll('.form-item-body').forEach(b => b.classList.remove('open'));
            
            if (!isOpen) {
                body.classList.add('open');
                await loadQuestions(formId);
            }
        }

        async function loadQuestions(formId) {
            try {
                const res = await fetch('/api/observations/forms/' + formId, { credentials: 'include' });
                const form = await res.json();
                const container = document.getElementById('questions-' + formId);
                
                if (form.questions.length === 0) {
                    container.innerHTML = '<div class="empty-state">No questions yet. Add one below.</div>';
                    return;
                }

                const typeLabels = { text: 'Text', checkbox: 'Yes/No', select: 'Multiple Choice', textarea: 'Long Text' };

                container.innerHTML = form.questions
                    .sort((a, b) => a.order - b.order)
                    .map(q => `
                        <div class="question-item">
                            <span class="drag-handle">⠿</span>
                            <span class="question-text">${q.text}</span>
                            ${q.required ? '<span class="question-required">Required</span>' : ''}
                            <span class="question-type">${typeLabels[q.question_type] || q.question_type}</span>
                            <button class="btn-danger" onclick="deleteQuestion(${formId}, ${q.id})">Remove</button>
                        </div>
                    `).join('');
            } catch (err) { console.error(err); }
        }

        async function createForm() {
            const name = document.getElementById('formName').value.trim();
            const desc = document.getElementById('formDesc').value.trim();
            if (!name) { showAlert('createAlert', 'error', 'Form name is required'); return; }
            try {
                const res = await fetch('/api/observations/forms/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ name, description: desc || null })
                });
                const data = await res.json();
                if (res.ok) {
                    showAlert('createAlert', 'success', 'Form created!');
                    document.getElementById('formName').value = '';
                    document.getElementById('formDesc').value = '';
                    loadForms();
                } else {
                    showAlert('createAlert', 'error', data.detail || 'Failed to create form');
                }
            } catch (err) { showAlert('createAlert', 'error', 'Connection error'); }
        }

        async function addQuestion(formId) {
            const text = document.getElementById('qtext-' + formId).value.trim();
            const type = document.getElementById('qtype-' + formId).value;
            const required = document.getElementById('qreq-' + formId).checked;
            if (!text) { alert('Question text is required'); return; }
            try {
                const res = await fetch('/api/observations/forms/' + formId + '/questions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ text, question_type: type, required, order: 0 })
                });
                if (res.ok) {
                    document.getElementById('qtext-' + formId).value = '';
                    document.getElementById('qreq-' + formId).checked = false;
                    await loadQuestions(formId);
                    loadForms();
                } else {
                    alert('Failed to add question');
                }
            } catch (err) { alert('Connection error'); }
        }

        async function deleteQuestion(formId, questionId) {
            if (!confirm('Remove this question?')) return;
            try {
                const res = await fetch('/api/observations/forms/' + formId + '/questions/' + questionId, {
                    method: 'DELETE',
                    credentials: 'include'
                });
                if (res.ok) {
                    await loadQuestions(formId);
                    loadForms();
                } else {
                    alert('Failed to remove question');
                }
            } catch (err) { alert('Connection error'); }
        }

        function showAlert(id, type, msg) {
            const el = document.getElementById(id);
            el.className = 'alert ' + type;
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
            localStorage.removeItem('employee_name');
            window.location.href = '/admin/login';
        }

        checkAuth();
        loadForms();
    </script>
</body>
</html>
